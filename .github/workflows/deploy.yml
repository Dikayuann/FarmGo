name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '--deploy')
    runs-on: self-hosted

    defaults:
      run:
        working-directory: /www/wwwroot/FarmGo

    steps:
      - name: Sync code to origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install & build frontend assets
        run: |
          npm ci
          npm run build

      - name: Ensure writable Laravel dirs
        run: |
          sudo chown -R www:www storage bootstrap/cache
          sudo chmod -R 775 storage bootstrap/cache

      - name: Laravel health check
        run: |
          php artisan about
          php artisan config:clear

      - name: Run migrations
        run: php artisan migrate --force

      - name: Cache Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan optimize

      - name: Restart queue worker
        run: php artisan queue:restart

      - name: Done
        run: echo "✅ FarmGo deployed successfully!"
